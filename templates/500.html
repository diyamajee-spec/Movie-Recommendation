{% extends 'base.html' %}

{% block content %}

<div class="container py-5 my-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-8 col-lg-6">
            <div class="glass-card p-5 border-secondary rounded-lg shadow-2xl">
                <div class="error-code text-orange font-weight-black mb-2" style="font-size: 8rem; line-height: 1; text-shadow: 0 0 30px rgba(249, 115, 22, 0.4);">500</div>
                <h2 class="text-white font-weight-bold mb-3"><i class="fa-solid fa-bug text-orange me-2"></i>Something Went Wrong</h2>
                <p class="text-muted mb-5 leading-relaxed">Our recommendation servers encountered an unexpected error. Don't worry, our engineers have been alerted and are investigating the issue!</p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg px-5 py-3 shadow-lg font-weight-bold">
                    <i class="fa-solid fa-house me-2"></i>Return to Homepage
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
