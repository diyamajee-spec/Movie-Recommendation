{% extends 'base.html' %}

{% block content %}

<div class="container py-5 my-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-8 col-lg-6">
            <div class="glass-card p-5 border-secondary rounded-lg shadow-2xl">
                <div class="error-code text-danger font-weight-black mb-2" style="font-size: 8rem; line-height: 1; text-shadow: 0 0 30px rgba(239, 68, 68, 0.4);">404</div>
                <h2 class="text-white font-weight-bold mb-3"><i class="fa-solid fa-face-dizzy text-danger me-2"></i>Lost in Space?</h2>
                <p class="text-muted mb-5 leading-relaxed">The page you are trying to access doesn't exist or has been moved. Let's get you back to the theater to find something to watch!</p>
                <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg px-5 py-3 shadow-lg font-weight-bold">
                    <i class="fa-solid fa-house me-2"></i>Return to Homepage
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
